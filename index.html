      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3) rotate(0deg); }

    const withParams = (url, params) => url + (url.includes("?") ? "&" : "?") + params;
    const heroSrc = (ape) => withParams(ape.imageUrl, "auto=format&fit=crop&q=80&w=1600");
    const thumbSrc = (ape) => withParams(ape.imageUrl, "auto=format&fit=crop&q=60&w=160");

    function timeAgo(ts) {
      const seconds = Math.max(0, (Date.now() - ts) / 1000);
      if (seconds < 60) return "just now";
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return minutes + "m ago";
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return hours + "h ago";
      return Math.floor(hours / 24) + "d ago";
    }

    /* Persist a piece of state to localStorage so a refresh keeps the session. */
    function usePersistentState(key, initialValue) {
      const [value, setValue] = useState(() => {
        try {
          const raw = window.localStorage.getItem(key);
          return raw == null ? initialValue : JSON.parse(raw);
        } catch (err) {
          return initialValue;
        }
      });
      useEffect(() => {
        try {
          window.localStorage.setItem(key, JSON.stringify(value));
        } catch (err) {
          /* storage unavailable (private mode, etc.) — session still works */
        }
      }, [key, value]);
      return [value, setValue];
    }

    /* --------------------------- confetti ---------------------------- */

    function ConfettiBurst({ burstKey }) {
      const pieces = useMemo(() => {
        return Array.from({ length: 18 }, () => ({
          emoji: CONFETTI_EMOJI[Math.floor(Math.random() * CONFETTI_EMOJI.length)],
          dx: (Math.random() * 2 - 1) * 230,
          dy: -(70 + Math.random() * 240),
          rot: (Math.random() * 2 - 1) * 420,
          delay: Math.random() * 0.12,
          size: 15 + Math.random() * 19,
        }));
      }, [burstKey]);

      return (
        <div className="pointer-events-none absolute inset-0 z-30 overflow-hidden" aria-hidden="true">
          {pieces.map((p, i) => (
            <span
              key={burstKey + "-" + i}
              className="confetti-piece"
              style={{
                left: "50%",
                top: "55%",
                fontSize: p.size + "px",
                animationDelay: p.delay + "s",
                "--dx": p.dx + "px",
                "--dy": p.dy + "px",
                "--rot": p.rot + "deg",
              }}
            >
              {p.emoji}
            </span>

        </div>

    /* --------------------------- hero card --------------------------- */

    function HeroCard({ ape, index, total, rating, celebration, loaded, failed, onLoad, onFail, onStep }) {
      const imgRef = useRef(null);

      // Safety net: cached images can fire `load` before React attaches the handler.
      useEffect(() => {
        const el = imgRef.current;
        if (el && el.complete && el.naturalWidth > 0) onLoad(ape.id);
      }, [ape.id]);

      return (
        <div className="relative aspect-[4/3] w-full overflow-hidden rounded-3xl border border-slate-800 bg-slate-900 shadow-2xl shadow-emerald-950/40 md:aspect-[16/10]">

              ref={imgRef}
              key={ape.id}
              src={heroSrc(ape)}
              alt={ape.name + " — " + ape.species}
              onLoad={() => onLoad(ape.id)}
              onError={() => onFail(ape.id)}

    /* -------------------------- rating panel ------------------------- */

    function RatingPanel({ ape, myRating, disabled, onRate }) {
      const [hovered, setHovered] = useState(null);

      return (

                  title={s + " — " + RATING_LABELS[s]}
                  onClick={() => onRate(s)}

    /* ------------------------- comments panel ------------------------ */

    function CommentsPanel({ ape, comments, onAdd }) {
      const [draft, setDraft] = useState("");
      const [, setClock] = useState(0);

      useEffect(() => {
        const t = window.setInterval(() => setClock((c) => c + 1), 30000);
        return () => window.clearInterval(t);
      }, []);

      const list = comments[ape.id] || [];

      const submit = (e) => {
        e.preventDefault();
        const text = draft.trim();
        if (!text) return;
        onAdd(ape.id, text);
        setDraft("");
      };

      return (
        <section className="rounded-3xl border border-slate-800 bg-slate-900/70 p-5 sm:p-6">
          <div className="flex flex-wrap items-baseline justify-between gap-x-3 gap-y-1">

              value={draft}
              onChange={(e) => setDraft(e.target.value)}

              disabled={!draft.trim()}

              <li
                key={c.id}
                className={"comment-in flex gap-3 rounded-2xl border p-3 " + (c.mine ? "border-emerald-400/25 bg-emerald-500/[0.06]" : "border-slate-800 bg-slate-950/60")}

                <span className="grid h-9 w-9 shrink-0 place-items-center rounded-full border border-slate-700 bg-slate-800 text-base">{c.avatar}</span>
                <div className="min-w-0">
                  <div className="flex flex-wrap items-baseline gap-x-2">
                    <span className={"text-sm font-bold " + (c.mine ? "text-emerald-300" : "text-slate-200")}>{c.author}</span>
                    <span className="text-[11px] text-slate-500">{timeAgo(c.ts)}</span>
                  </div>
                  <p className="mt-0.5 break-words text-sm leading-relaxed text-slate-300">{c.text}</p>
                </div>
              </li>
            ))}
          </ul>
        </section>
      );
    }

    /* --------------------------- stats panel ------------------------- */

    function StatsPanel({ ratings, comments, onJump }) {
      const total = APE_DATABASE.length;
      const rated = APE_DATABASE.filter((a) => typeof ratings[a.id] === "number");
      const avg = rated.length ? rated.reduce((sum, a) => sum + ratings[a.id], 0) / rated.length : null;
      const commentCount = Object.values(comments).reduce((sum, list) => sum + list.length, 0);
      const leaders = [...rated].sort((a, b) => ratings[b.id] - ratings[a.id] || Number(a.id) - Number(b.id)).slice(0, 3);
      const medals = ["🥇", "🥈", "🥉"];
      const pct = Math.round((rated.length / total) * 100);

      return (
        <aside className="rounded-3xl border border-slate-800 bg-slate-900/70 p-5 sm:p-6">
          <h3 className="font-display text-lg font-bold text-white">📊 Troop Stats</h3>

          <div className="mt-4 grid grid-cols-2 gap-3">
            <div className="rounded-2xl border border-slate-800 bg-slate-950/60 p-4">
              <p className="text-[11px] font-semibold uppercase tracking-wider text-slate-500">Apes Reviewed</p>
              <p className="mt-1 font-display text-3xl font-black text-emerald-400">
                {rated.length}
                <span className="text-base font-bold text-slate-500"> / {total}</span>
              </p>
              <div className="mt-2 h-1.5 overflow-hidden rounded-full bg-slate-800">
                <div className="h-full rounded-full bg-gradient-to-r from-emerald-500 to-emerald-300 transition-all duration-700" style={{ width: pct + "%" }} />
              </div>
            </div>
            <div className="rounded-2xl border border-slate-800 bg-slate-950/60 p-4">
              <p className="text-[11px] font-semibold uppercase tracking-wider text-slate-500">Average Score</p>
              <p className="mt-1 font-display text-3xl font-black text-amber-300">{avg == null ? "–" : avg.toFixed(1)}</p>
              <p className="mt-2 text-[11px] text-slate-500">{avg == null ? "no ratings yet" : "across " + rated.length + (rated.length === 1 ? " rating" : " ratings")}</p>
            </div>
          </div>

          <div className="mt-3 flex items-center justify-between rounded-2xl border border-slate-800 bg-slate-950/60 px-4 py-2.5 text-sm">
            <span className="text-slate-400">💬 Comments dropped</span>
            <span className="font-bold text-emerald-300">{commentCount}</span>
          </div>

          <div className="mt-5">
            <h4 className="text-[11px] font-semibold uppercase tracking-wider text-slate-500">🏆 Leaderboard — your top troop</h4>
            {leaders.length === 0 ? (
              <div className="mt-2 rounded-2xl border border-dashed border-slate-700 p-4 text-center text-sm text-slate-500">
                Rate a few apes to crown your champions.
              </div>
            ) : (
              <ul className="mt-2 space-y-2">
                {leaders.map((a, i) => (
                  <li key={a.id}>
                    <button
                      type="button"
                      onClick={() => onJump(APE_DATABASE.indexOf(a))}
                      className="group flex w-full items-center gap-3 rounded-2xl border border-slate-800 bg-slate-950/60 p-2.5 text-left transition hover:border-emerald-400/50 hover:bg-slate-900"
                    >
                      <span className="text-lg">{medals[i]}</span>
                      <img src={thumbSrc(a)} alt={a.name} loading="lazy" className="h-12 w-12 rounded-xl border border-slate-700 object-cover" />
                      <span className="min-w-0 flex-1">
                        <span className="block truncate text-sm font-semibold text-slate-200 group-hover:text-emerald-300">{a.name}</span>
                        <span className="block truncate text-xs italic text-slate-500">{a.species}</span>
                      </span>
                      <span className="rounded-lg border border-amber-300/30 bg-amber-400/10 px-2 py-1 text-xs font-black text-amber-300">{ratings[a.id]}/10</span>
                    </button>
                  </li>
                ))}
              </ul>
            )}
          </div>
        </aside>
      );
    }

    /* ------------------------ completion modal ----------------------- */

    function CompletionModal({ total, average, champion, championScore, onClose }) {
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === "Escape") onClose();
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [onClose]);

      return (
        <div className="fixed inset-0 z-50 grid place-items-center bg-slate-950/80 p-4 backdrop-blur-sm" onClick={onClose}>
          <div
            className="pop-in relative w-full max-w-md overflow-hidden rounded-3xl border border-emerald-400/30 bg-slate-900 p-8 text-center shadow-[0_0_80px_rgba(52,211,153,0.25)]"
            onClick={(e) => e.stopPropagation()}
          >
            <ConfettiBurst burstKey="troop-complete" />
            <div className="text-6xl">🏆</div>
            <h3 className="mt-4 font-display text-2xl font-black text-white">Troop fully reviewed!</h3>
            <p className="mt-2 text-sm text-slate-400">
              You judged all <span className="font-bold text-emerald-300">{total} apes</span> with an average score of <span className="font-bold text-amber-300">{average}</span>.
            </p>
            {champion && (
              <p className="mt-1 text-sm text-slate-400">
                Reigning champion: <span className="font-bold text-emerald-300">{champion}</span> ({championScore}/10)
              </p>
            )}
            <button
              type="button"
              onClick={onClose}
              className="mt-6 rounded-xl bg-emerald-500 px-6 py-2.5 font-bold text-slate-950 transition hover:bg-emerald-400 active:scale-95"
            >
              Keep exploring 🦍
            </button>
          </div>
        </div>
      );
    }

    /* ------------------------------ app ------------------------------ */

    function App() {
      const n = APE_DATABASE.length;

      const [rawIndex, setRawIndex] = usePersistentState("aperate:v1:index", 0);
      const [ratings, setRatings] = usePersistentState("aperate:v1:ratings", {});
      const [comments, setComments] = usePersistentState("aperate:v1:comments", SEED_COMMENTS);

      const [celebration, setCelebration] = useState(null); // { score, key }
      const [complete, setComplete] = useState(false);
      const [loadedIds, setLoadedIds] = useState({});
      const [failedIds, setFailedIds] = useState({});
      const advanceTimer = useRef(null);

      const parsed = Number(rawIndex);
      const baseIndex = Number.isFinite(parsed) ? Math.trunc(parsed) : 0;
      const index = ((baseIndex % n) + n) % n;
      const ape = APE_DATABASE[index];
      const myRating = ratings[ape.id];

      const ratedApes = APE_DATABASE.filter((a) => typeof ratings[a.id] === "number");
      const avgScore = ratedApes.length ? ratedApes.reduce((sum, a) => sum + ratings[a.id], 0) / ratedApes.length : null;
      const isAllRated = ratedApes.length === n;
      const champion = ratedApes.length
        ? ratedApes.reduce((best, a) => (ratings[a.id] > ratings[best.id] ? a : best), ratedApes[0])
        : null;

      const jumpTo = (i) => setRawIndex(((i % n) + n) % n);
      const goTo = (i) => {
        if (celebration) return;
        jumpTo(i);
      };
      const step = (delta) => goTo(index + delta);

      const rate = (score) => {
        if (celebration || complete) return;
        const wasComplete = APE_DATABASE.every((a) => typeof ratings[a.id] === "number");
        const nextRatings = { ...ratings, [ape.id]: score };
        const nowComplete = APE_DATABASE.every((a) => typeof nextRatings[a.id] === "number");

        setRatings(nextRatings);
        setCelebration({ score, key: Date.now() });

        window.clearTimeout(advanceTimer.current);
        advanceTimer.current = window.setTimeout(() => {
          setCelebration(null);
          let target = (index + 1) % n; // default: simple next
          for (let s = 1; s <= n; s++) {
            const candidate = (index + s) % n;
            if (typeof nextRatings[APE_DATABASE[candidate].id] !== "number") {
              target = candidate;
              break;
            }
          }
          jumpTo(target);
          if (!wasComplete && nowComplete) setComplete(true);
        }, 1150);
      };

      useEffect(() => () => window.clearTimeout(advanceTimer.current), []);

      // Preload the next ape's photo for a seamless advance.
      useEffect(() => {
        const next = APE_DATABASE[(index + 1) % n];
        const preloader = new Image();
        preloader.src = heroSrc(next);
      }, [index, n]);

      // Global keyboard shortcuts: arrows browse, 1–9 & 0 rate.
      const actionsRef = useRef({});
      actionsRef.current = { rate, step, modalOpen: complete };
      useEffect(() => {
        const onKey = (e) => {
          const tag = e.target && e.target.tagName;
          if (tag === "INPUT" || tag === "TEXTAREA" || e.metaKey || e.ctrlKey || e.altKey) return;
          if (actionsRef.current.modalOpen) return;
          if (e.key === "ArrowRight") actionsRef.current.step(1);
          else if (e.key === "ArrowLeft") actionsRef.current.step(-1);
          else if (/^[0-9]$/.test(e.key)) actionsRef.current.rate(e.key === "0" ? 10 : Number(e.key));
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, []);

      const markLoaded = (id) => setLoadedIds((m) => (m[id] ? m : { ...m, [id]: true }));
      const markFailed = (id) => setFailedIds((m) => (m[id] ? m : { ...m, [id]: true }));

      const addComment = (apeId, text) => {
        const comment = {
          id: "c-" + Date.now() + "-" + Math.random().toString(36).slice(2, 7),
          author: "You",
          avatar: AVATARS[Math.floor(Math.random() * AVATARS.length)],
          text: text,
          ts: Date.now(),
          mine: true,
        };
        setComments((prev) => ({ ...prev, [apeId]: [comment, ...(prev[apeId] || [])] }));
      };

      const resetSession = () => {
        if (!window.confirm("Reset ape-review? All ratings and comments will be cleared.")) return;
        window.clearTimeout(advanceTimer.current);
        setCelebration(null);
        setComplete(false);
        setRatings({});
        setComments(SEED_COMMENTS);
        setRawIndex(0);
      };

      return (
        <div className="min-h-screen">
          {/* ambient jungle glow */}
          <div className="pointer-events-none fixed inset-0 -z-10 overflow-hidden" aria-hidden="true">
            <div className="absolute -left-32 -top-32 h-96 w-96 rounded-full bg-emerald-500/10 blur-3xl" />
            <div className="absolute -right-40 top-1/3 h-[28rem] w-[28rem] rounded-full bg-amber-400/[0.07] blur-3xl" />
            <div className="absolute bottom-0 left-1/3 h-80 w-80 rounded-full bg-emerald-400/[0.06] blur-3xl" />
          </div>

          <Header ratedCount={ratedApes.length} total={n} allRated={isAllRated} onReset={resetSession} />

          <main className="mx-auto grid max-w-7xl gap-6 px-4 py-6 sm:px-6 lg:grid-cols-[minmax(0,1fr)_380px] lg:gap-8">
            {/* hero + attribution + rating */}
            <div className="rise lg:col-start-1 lg:row-start-1">
              <HeroCard
                ape={ape}
                index={index}
                total={n}
                rating={myRating}
                celebration={celebration}
                loaded={!!loadedIds[ape.id]}
                failed={!!failedIds[ape.id]}
                onLoad={markLoaded}
                onFail={markFailed}
                onStep={step}
              />

              {/* attribution + quick-jump dots */}
              <div className="mt-3 flex flex-wrap items-center justify-between gap-3">
                <a
                  href={ape.sourceUrl}
                  target="_blank"
                  rel="noopener noreferrer"
                  className="group inline-flex items-center gap-2 rounded-xl border border-slate-800 bg-slate-900/60 px-3.5 py-2 text-sm text-slate-300 transition hover:border-emerald-400/50 hover:text-emerald-300"
                >
                  <CameraIcon />
                  <span>
                    Original photo on <span className="font-semibold text-emerald-400 underline decoration-emerald-500/40 decoration-2 underline-offset-4 group-hover:decoration-emerald-300">{ape.platform}</span>
                  </span>
                  <ArrowUpRightIcon />
                </a>
                <div className="flex items-center gap-2 px-1">
                  {APE_DATABASE.map((a, i) => (
                    <button
                      key={a.id}
                      type="button"
                      onClick={() => goTo(i)}
                      aria-label={"Show " + a.name}
                      title={a.name}
                      className={
                        "h-2.5 rounded-full transition-all duration-300 " +
                        (i === index
                          ? "w-8 bg-emerald-400 shadow-[0_0_12px_rgba(52,211,153,0.6)]"
                          : typeof ratings[a.id] === "number"
                          ? "w-2.5 bg-amber-400/70 hover:bg-amber-300"
                          : "w-2.5 bg-slate-700 hover:bg-slate-500")
                      }
                    />
                  ))}
                </div>
              </div>

              <RatingPanel ape={ape} myRating={myRating} disabled={celebration != null} onRate={rate} />
            </div>

            {/* per-ape comments */}
            <div className="rise lg:col-start-1 lg:row-start-2" style={{ animationDelay: "0.12s" }}>
              <CommentsPanel ape={ape} comments={comments} onAdd={addComment} />
            </div>

            {/* persistent stats dashboard */}
            <div className="rise lg:col-start-2 lg:row-span-2 lg:row-start-1" style={{ animationDelay: "0.06s" }}>
              <div className="lg:sticky lg:top-24">
                <StatsPanel ratings={ratings} comments={comments} onJump={goTo} />
              </div>
            </div>
          </main>

          <footer className="mx-auto max-w-7xl px-4 pb-10 pt-2 text-center text-xs text-slate-600 sm:px-6">
            <p>Photos belong to their photographers — follow the source link under each image. Ratings & comments are saved locally in this browser.</p>
            <p className="mt-2 hidden items-center justify-center gap-1.5 sm:flex">
              <kbd>←</kbd><kbd>→</kbd> browse&nbsp;·&nbsp;<kbd>1</kbd>–<kbd>9</kbd>, <kbd>0</kbd> rates a 10&nbsp;·&nbsp;<kbd>Enter</kbd> posts your comment
            </p>
          </footer>

          {complete && (
            <CompletionModal
              total={n}
              average={avgScore == null ? "0" : avgScore.toFixed(1)}
              champion={champion ? champion.name : null}
              championScore={champion ? ratings[champion.id] : null}
              onClose={() => setComplete(false)}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
